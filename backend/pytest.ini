# backend/pytest.ini

[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 异步测试支持
asyncio_mode = auto

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html

# 标记定义
markers =
    asyncio: 异步测试
    integration: 集成测试
    unit: 单元测试
    slow: 慢速测试
